<div class="login">

<h2>Login</h2>

<form (ngSubmit)="login()">

<input
type="email"
placeholder="Email"
[(ngModel)]="email"
name="email"
/>

<input
type="password"
placeholder="Password"
[(ngModel)]="password"
name="password"
/>

<button type="submit">
Ingresar
</button>

<p *ngIf="error">
Credenciales incorrectas
</p>

</form>

</div>
