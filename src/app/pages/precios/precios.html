<form [formGroup]="form">

<mat-card appearance="outlined">

  <mat-card-header>
    <mat-card-title><h3>Modificar  precios según tipo de vehículo</h3></mat-card-title>
    <mat-card-subtitle style="color: #fff;">Seleccione el precio a modificar</mat-card-subtitle>
  </mat-card-header>
<br>
  <mat-card-content>

    <div class="form-row">

        <!-- Tipo vehículo -->
      <mat-form-field appearance="outline">
        <mat-label>Tipo Vehículo</mat-label>
        <mat-select formControlName="tipoVehiculo">

          <mat-option value="carro">Carro</mat-option>
          <mat-option value="moto">Moto</mat-option>

        </mat-select>

        <mat-error *ngIf="form.get('tipoVehiculo')?.hasError('required')">
          Seleccione un tipo de vehículo
        </mat-error>
      </mat-form-field>

      <!-- Precio -->
      <mat-form-field appearance="outline">
  <mat-label>Precio</mat-label>

        <input matInput type="number" formControlName="precio">

            <mat-error *ngIf="form.get('precio')?.hasError('required')">
                 El precio es obligatorio
             </mat-error>
    </mat-form-field>

      

    </div>

  </mat-card-content>

  <mat-card-actions align="end">
    <button 
      mat-raised-button 
      color="primary"
      class="btnRegistrar"
      [disabled]="form.invalid">

      <mat-icon>save</mat-icon>
      Registrar

    </button>
  </mat-card-actions>

 


</mat-card>

</form>
