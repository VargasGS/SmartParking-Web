<form [formGroup]="form">

  <!-- REGISTRO -->
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <h3>Mantenimiento vehículos y sus precios</h3>
      </mat-card-title>
    </mat-card-header>
    <br>
    <mat-card-content>

      <mat-form-field appearance="outline" class="cardIndividual">
        <mat-label>Tipo vehículo</mat-label>
        <input matInput formControlName="tipoVehiculo">
      </mat-form-field>

      <mat-form-field appearance="outline" class="cardIndividual">
        <mat-label>Precio en colones</mat-label>
        <input matInput type="number" formControlName="precioC">
      </mat-form-field>

      <mat-form-field appearance="outline" class="cardIndividual">
        <mat-label>Precio en dólares</mat-label>
        <input matInput type="number" formControlName="precioD">
      </mat-form-field>

    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-raised-button color="primary"
              [disabled]="form.invalid"
              (click)="guardarTipoVehiculo()">
        <mat-icon>save</mat-icon>
        Registrar
      </button>
    </mat-card-actions>

  </mat-card>

  <br>

  <!-- LISTA -->
  <div formArrayName="vehiculos" class="cards-container">

    <mat-card *ngFor="let item of vehiculos.controls; let i = index; trackBy: trackByFn"
              [formGroupName]="i"
              class="card-item">

      <mat-card-header>
        <mat-card-title>
          {{ item.value.tipoVehiculoDescripcion }}
        </mat-card-title>
      </mat-card-header>

      <br>

      <mat-form-field appearance="outline">
        <mat-label>Precio ₡</mat-label>
        <input matInput type="number" formControlName="PrecioColones">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio $</mat-label>
        <input matInput type="number" formControlName="PrecioDolares">
      </mat-form-field>

      <mat-card-actions align="end">

        <button mat-icon-button color="warn"
                (click)="eliminarTipoVehiculo(i, item.value.idTipoVehiculo)">
          <mat-icon>delete</mat-icon>
        </button>

        <button mat-icon-button color="primary"
                (click)="actualizarPrecio(i)">
          <mat-icon>edit</mat-icon>
        </button>

      </mat-card-actions>

    </mat-card>

  </div>

</form>
