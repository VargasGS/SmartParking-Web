<mat-sidenav-container class="container">

  <!-- Sidebar -->
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <h3>Menú</h3>

    <button mat-button routerLink="/precios">Mantenimiento precios</button>
    <button mat-button routerLink="/pisos">Mantenimiento de pisos</button>
    <button mat-button routerLink="/vehiculo">Registro de vehículos</button>
  </mat-sidenav>

  <!-- Contenido -->
  <mat-sidenav-content>

    <!-- Navbar -->
    <mat-toolbar color="primary" class="toolbar">
      <a routerLink="/dashboard">
        <img src="Logo_SmartParking2.png" class="logo">
      </a>

      <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn">
        <mat-icon>menu</mat-icon>
      </button>

      <h1>SMART PARKING</h1>

    </mat-toolbar>

    <div class="main">

      <!-- Contenido dinámico -->
      <div class="content">
        <router-outlet></router-outlet>
      </div>

      <!-- Footer -->
      <mat-toolbar color="primary" class="footer">
        <span>© 2026 Smart Parking</span>
        <span class="spacer"></span>
      </mat-toolbar>

    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
